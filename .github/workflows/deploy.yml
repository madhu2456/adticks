name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: adticks-production
  cancel-in-progress: false

jobs:
  security-scan:
    name: Security scan and build validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Typecheck frontend
        run: npm run typecheck

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: pip-audit
        run: pip-audit -r backend/requirements.txt

      - name: Validate production compose
        run: |
          cat > .env <<'EOF'
          NEXT_PUBLIC_API_URL=https://adticks.com/api/v1
          BACKEND_PUBLIC_URL=https://adticks.com
          FRONTEND_PUBLIC_URL=https://adticks.com
          APP_SECRET_KEY=ci-only-compose-validation-secret
          DATABASE_URL=postgresql+psycopg://adticks:ci-password@postgres:5432/adticks
          POSTGRES_PASSWORD=ci-password
          EOF
          docker compose -f docker-compose.prod.yml config

  deploy:
    name: Deploy to server
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -Eeuo pipefail

            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/opt/adticks/"
            fi
            REPO_URL="git@github.com:${{ github.repository }}.git"

            echo "Starting Adticks deployment in $APP_DIR"
            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              if [ -z "$(find "$APP_DIR" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
                echo "No git checkout found. Cloning $REPO_URL into $APP_DIR"
                git clone "$REPO_URL" "$APP_DIR"
              else
                echo "ERROR: $APP_DIR is not a git repository and is not empty."
                echo "Move the existing files elsewhere or clone the repo into $APP_DIR before deploying."
                ls -la "$APP_DIR"
                exit 1
              fi
            fi

            cd "$APP_DIR"

            echo "Fetching latest main"
            if git remote get-url origin >/dev/null 2>&1; then
              git remote set-url origin "$REPO_URL"
            else
              git remote add origin "$REPO_URL"
            fi
            git fetch --prune origin
            git checkout -B main origin/main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "ERROR: Missing $APP_DIR/.env"
              echo "Create the production env file on the server before deploying."
              exit 1
            fi
            if [ ! -r .env ]; then
              echo "ERROR: $APP_DIR/.env exists but is not readable by the deploy user."
              echo "Fix ownership or permissions on the server, for example: sudo chown \$USER:\$USER $APP_DIR/.env && chmod 600 $APP_DIR/.env"
              exit 1
            fi
            chmod 600 .env 2>/dev/null || echo "Warning: could not chmod .env; continuing because it is readable."

            echo "Building and restarting production containers"
            docker compose -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Waiting for application health checks"
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3100/api/health >/dev/null && curl -fsS http://127.0.0.1:8100/api/v1/health >/dev/null; then
                echo "Application health checks passed"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "Health checks failed"
                docker compose -f docker-compose.prod.yml ps
                docker compose -f docker-compose.prod.yml logs --tail=120 frontend backend
                exit 1
              fi

              sleep 2
            done

            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            elif command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              SUDO="sudo -n"
            else
              SUDO=""
            fi

            if [ "$(id -u)" -eq 0 ] || [ -n "$SUDO" ]; then
              echo "Syncing nginx config from repo"
              $SUDO install -Dm644 nginx/nginx.conf /etc/nginx/sites-available/adticks
              $SUDO install -Dm644 nginx/robots.txt /var/www/adticks/robots.txt
              $SUDO ln -sfn /etc/nginx/sites-available/adticks /etc/nginx/sites-enabled/adticks
              if [ -f /etc/nginx/sites-enabled/default ]; then
                $SUDO rm -f /etc/nginx/sites-enabled/default
              fi
              $SUDO nginx -t
              $SUDO systemctl reload nginx
            else
              echo "Skipping nginx sync: deploy user is not root and has no passwordless sudo"
            fi

            echo "Pruning unused Docker images"
            docker image prune -f

            echo "Adticks deployment completed"
