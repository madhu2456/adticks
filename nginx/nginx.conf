# Adticks production nginx site.
# This file is copied by .github/workflows/deploy.yml to:
# /etc/nginx/sites-available/adticks
#
# Update this file in the repo before deploy; CI syncs it to the server.

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  listen [::]:80;
  server_name adticks.com www.adticks.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name adticks.com www.adticks.com;

  ssl_certificate /etc/letsencrypt/live/adticks.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/adticks.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:AdticksSSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 25m;

  access_log /var/log/nginx/adticks.access.log;
  error_log /var/log/nginx/adticks.error.log warn;

  location = /robots.txt {
    alias /var/www/adticks/robots.txt;
    access_log off;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /api/health {
    proxy_pass http://127.0.0.1:3100/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/v1/ {
    proxy_pass http://127.0.0.1:8100/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location / {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
