# Adticks production nginx site.
# This file is copied by .github/workflows/deploy.yml to:
# /etc/nginx/sites-available/adticks
#
# Update this file in the repo before deploy; CI syncs it to the server.

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  listen [::]:80;
  server_name adticks.com www.adticks.com;

  client_max_body_size 25m;

  access_log /var/log/nginx/adticks.access.log;
  error_log /var/log/nginx/adticks.error.log warn;

  location = /robots.txt {
    alias /opt/adticks/nginx/robots.txt;
    access_log off;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /api/health {
    proxy_pass http://127.0.0.1:3000/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/v1/ {
    proxy_pass http://127.0.0.1:8000/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
